
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-postgres
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-postgres
  template:
    metadata:
      labels:
        app: user-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: USER_DB_PASSWORD
            - name: POSTGRES_DB
              value: users_db
---
apiVersion: v1
kind: Service
metadata:
  name: user-postgres
  namespace: ecommerce
spec:
  selector:
    app: user-postgres
  ports:
    - port: 5432
      targetPort: 5432